services:
  db:
    image: postgres:18-alpine
    container_name: rent-nest-psql
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: rentnest
    volumes:
      - rentnest_data:/var/lib/postgresql/18/docker

  redis:
    image: redis:8-alpine
    container_name: rent-nest-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass "admin" --appendonly yes

volumes:
  rentnest_data:
  redis_data:
